<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内容发布平台</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <style>
      .cpp-notif-inner { min-height: 20px; }
      .cpp-notif-msg { color: #444; font-size: 13px; line-height: 1.5; word-break: break-all; }
      .cpp-notif-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .cpp-notif-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; border: 1px solid #e4e7ed; }
      .cpp-notif-done .cpp-notif-msg { font-weight: 500; color: #333; }
    </style>
  </body>
</html>
